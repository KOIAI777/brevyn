name: Mirror release to R2

on:
  workflow_dispatch:
    inputs:
      tag:
        description: Existing Brevyn Community release tag to mirror
        required: true
        type: string

permissions:
  contents: read

concurrency:
  group: r2-community-${{ inputs.tag }}
  cancel-in-progress: false

jobs:
  mirror:
    name: Mirror Community release
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Mirror release assets
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_REPOSITORY: KOIAI777/brevyn
          RELEASE_TAG: ${{ inputs.tag }}
          R2_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
          R2_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
          R2_ENDPOINT: ${{ secrets.R2_ENDPOINT }}
          R2_BUCKET: ${{ vars.R2_BUCKET }}
          R2_EDITION: community
          R2_PUBLIC_BASE_URL: ${{ vars.R2_PUBLIC_BASE_URL }}
        run: bash scripts/mirror-release-to-r2.sh
