name: Community Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: read

concurrency:
  group: community-release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  verify:
    name: Verify release source
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Validate release tag
        shell: bash
        run: |
          set -euo pipefail
          node --input-type=module <<'NODE'
          import { readFileSync } from "node:fs";

          const packageJson = JSON.parse(readFileSync("package.json", "utf8"));
          const packageLock = JSON.parse(readFileSync("package-lock.json", "utf8"));
          const expectedTag = `v${packageJson.version}`;
          if (process.env.GITHUB_REF_NAME !== expectedTag) {
            throw new Error(`Release tag ${process.env.GITHUB_REF_NAME} does not match package version ${expectedTag}.`);
          }
          if (packageLock.version !== packageJson.version || packageLock.packages?.[""]?.version !== packageJson.version) {
            throw new Error("package.json and package-lock.json versions do not match.");
          }

          const notesPath = `.github/release-notes/${expectedTag}.md`;
          readFileSync(notesPath, "utf8");
          NODE

          git fetch origin main:refs/remotes/origin/main
          if ! git merge-base --is-ancestor "$GITHUB_SHA" origin/main; then
            echo "::error::Release tag must point to a commit contained in main."
            exit 1
          fi

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: npm

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.9"

      - name: Install dependencies
        run: npm ci

      - name: Verify source
        run: npm run verify

  build-mac:
    name: Build signed macOS ARM64
    runs-on: macos-latest
    needs: verify
    timeout-minutes: 60
    environment: community-release
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Prepare LibreOffice runtime
        run: brew install --cask libreoffice

      - name: Prepare Apple notarization key
        env:
          APPLE_API_KEY_BASE64: ${{ secrets.APPLE_API_KEY_BASE64 }}
        run: |
          set -euo pipefail
          mkdir -p "$RUNNER_TEMP/apple"
          printf '%s' "$APPLE_API_KEY_BASE64" | base64 -D > "$RUNNER_TEMP/apple/AuthKey.p8"
          chmod 600 "$RUNNER_TEMP/apple/AuthKey.p8"

      - name: Import Community signing certificate
        env:
          MAC_CSC_LINK: ${{ secrets.MAC_CSC_LINK }}
          MAC_CSC_KEY_PASSWORD: ${{ secrets.MAC_CSC_KEY_PASSWORD }}
          KEYCHAIN_PASSWORD: ${{ github.run_id }}-${{ github.run_attempt }}
        run: |
          set -euo pipefail
          mkdir -p "$RUNNER_TEMP/apple"
          printf '%s' "$MAC_CSC_LINK" | base64 -D > "$RUNNER_TEMP/apple/certificate.p12"

          security create-keychain -p "$KEYCHAIN_PASSWORD" "$RUNNER_TEMP/apple/build.keychain"
          security set-keychain-settings -lut 21600 "$RUNNER_TEMP/apple/build.keychain"
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$RUNNER_TEMP/apple/build.keychain"
          security default-keychain -s "$RUNNER_TEMP/apple/build.keychain"
          security list-keychains -d user -s "$RUNNER_TEMP/apple/build.keychain" login.keychain

          security import "$RUNNER_TEMP/apple/certificate.p12" \
            -k "$RUNNER_TEMP/apple/build.keychain" \
            -P "$MAC_CSC_KEY_PASSWORD" \
            -T /usr/bin/codesign \
            -T /usr/bin/security
          security set-key-partition-list -S apple-tool:,apple:,codesign: \
            -s -k "$KEYCHAIN_PASSWORD" "$RUNNER_TEMP/apple/build.keychain"

          SIGNING_IDENTITIES="$(security find-identity -p codesigning -v "$RUNNER_TEMP/apple/build.keychain")"
          printf '%s\n' "$SIGNING_IDENTITIES"
          if ! grep -q '34286AF67A6DE1E55F88380F8C6006FEA8E36A06' <<< "$SIGNING_IDENTITIES"; then
            echo "::error::The Brevyn Community Developer ID identity was not imported."
            exit 1
          fi

      - name: Build and publish macOS
        env:
          GH_TOKEN: ${{ github.token }}
          EP_PRE_RELEASE: ${{ contains(github.ref_name, '-') }}
          BREVYN_REQUIRE_LIBREOFFICE_RUNTIME: "1"
          APPLE_API_KEY: ${{ runner.temp }}/apple/AuthKey.p8
          APPLE_API_KEY_ID: ${{ secrets.APPLE_API_KEY_ID }}
          APPLE_API_ISSUER: ${{ secrets.APPLE_API_ISSUER }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: |
          echo "Open files before: $(ulimit -n)"
          ulimit -n 65536 || ulimit -n 32768 || ulimit -n 16384 || true
          echo "Open files after: $(ulimit -n)"
          npm run dist:mac -- --publish always

  build-windows:
    name: Build Windows x64
    runs-on: windows-latest
    needs: build-mac
    timeout-minutes: 60
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Prepare LibreOffice runtime
        shell: pwsh
        run: |
          choco install libreoffice-fresh --yes --no-progress
          $soffice = Join-Path $env:ProgramFiles "LibreOffice\program\soffice.com"
          if (-not (Test-Path $soffice)) {
            throw "LibreOffice soffice.com was not installed at $soffice"
          }
          & $soffice --headless --version

      - name: Build and publish Windows
        env:
          GH_TOKEN: ${{ github.token }}
          EP_PRE_RELEASE: ${{ contains(github.ref_name, '-') }}
          BREVYN_REQUIRE_LIBREOFFICE_RUNTIME: "1"
        run: npm run dist:win -- --publish always

  publish-notes:
    name: Publish release notes
    runs-on: ubuntu-latest
    needs: build-windows
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Update GitHub Release
        uses: actions/github-script@v8
        with:
          github-token: ${{ github.token }}
          script: |
            const fs = require("fs");
            const path = require("path");

            const tag = context.ref.replace("refs/tags/", "");
            const version = tag.replace(/^v/, "");
            const notesPath = path.join(".github", "release-notes", `${tag}.md`);
            if (!fs.existsSync(notesPath)) {
              throw new Error(`Missing release notes: ${notesPath}`);
            }

            const release = await github.rest.repos.getReleaseByTag({
              owner: context.repo.owner,
              repo: context.repo.repo,
              tag,
            });

            await github.rest.repos.updateRelease({
              owner: context.repo.owner,
              repo: context.repo.repo,
              release_id: release.data.id,
              name: `Brevyn Community ${version}`,
              body: fs.readFileSync(notesPath, "utf8"),
              draft: false,
              prerelease: version.includes("-"),
            });
